<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Test Platformasi</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        
        body {
            background: linear-gradient(120deg, #264653, #2a9d8f, #f4a261); 
            font-family: 'Roboto', sans-serif; 
            margin: 0;
            padding: 0;
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 80%;
            max-width: 1200px;
        }

        
        header {
            padding: 40px 0;
            margin-top: 50px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        header h1 {
            font-family: 'Montserrat', sans-serif; 
            font-size: 50px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #fff;
            animation: fadeIn 2s ease-out;
        }

        
        nav ul {
            list-style: none;
            padding: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        nav ul li {
            display: inline;
        }

        nav ul li a {
            text-decoration: none;
            color: #fff;
            background: linear-gradient(90deg, #264653, #2a9d8f);
            padding: 12px 30px;
            border-radius: 30px;
            font-family: 'Roboto', sans-serif; 
            font-size: 18px;
            font-weight: 500;
            text-transform: uppercase;
            transition: transform 0.3s ease, background-color 0.3s ease;
        }

        nav ul li a:hover {
            background: linear-gradient(90deg, #2a9d8f, #264653);
            transform: scale(1.1);
        }

        
        .main-content {
            text-align: center;
            margin-top: 80px;
            animation: fadeInUp 2s ease-out;
        }

        .main-content h2 {
            font-family: 'Montserrat', sans-serif; 
            font-size: 60px;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: 1px;
            color: #fff;
            animation: fadeIn 2s ease-out;
        }

        .main-content p {
            font-family: 'Roboto', sans-serif; 
            font-size: 20px;
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            line-height: 1.5;
            opacity: 0.9;
            animation: fadeIn 2s ease-out;
        }

        
        .btn {
            background: linear-gradient(135deg, #264653, #2a9d8f);
            color: white;
            padding: 15px 35px;
            border: none;
            border-radius: 50px;
            font-family: 'Roboto', sans-serif; 
            font-size: 20px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            display: inline-block;
            margin: 10px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: linear-gradient(135deg, #2a9d8f, #264653);
            transform: scale(1.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .btn:focus {
            outline: none;
        }

        footer {
            background-color: rgba(0, 0, 0, 0.6);
            padding: 20px 0;
            text-align: center;
            margin-top: 50px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        footer p {
            color: #ffffff;
            margin: 0;
            font-size: 14px;
        }

        
        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(50px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Online Test Platformasi</h1>
            <nav>
                <ul>
                    <li><a href="{% url 'login' %}" class="btn">Kirish</a></li>
                    <li><a href="{% url 'register' %}" class="btn">Ro'yxatdan O'tish</a></li>
                    <li><a href="{% url 'personal_cabinet' %}" class="btn">Shaxsiy Kabinet</a></li>
                </ul>
            </nav>
        </header>

        <section class="main-content">
            <p>Eng yangi va qiziqarli testlar bilan bilimlaringizni tekshirib ko'ring. O'z bilim doirangizni kengaytiring va rivojlaning!</p>
        </section>
    </div>
</body>
</html>
