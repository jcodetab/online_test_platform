{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kazus: Test to‘lovi</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #3b82f6cc, #16a34acc), url("{% static 'img/payment-bg.jpg' %}") center/cover no-repeat;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .card {
      background: rgba(255, 255, 255, 0.4);
      border-radius: 16px;
      padding: 40px 35px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.25);
      animation: fadeInUp .6s ease;
      backdrop-filter: blur(10px);
  }
  h2 { text-align: center; margin-bottom: 0px; }
  .row { margin-bottom: 15px; }
  label { font-weight: 600; }
  input[type="checkbox"] { margin-right: 8px; }
  input[type="number"], select {
    width: 100%;
    padding: 8px;
    margin-top: 6px;
    border-radius: 6px;
    border: 1px solid #ccc;
  }
  button {
    width: 100%;
    padding: 10px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background-color: #4CAF50;
    color: white;
    cursor: pointer;
  }
  button:hover { background-color: #43a047; }
  #paidOptions {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid #eee;
    display: none;
  }
  #status {
    margin-top: 10px;
    font-weight: 600;
    text-align: center;
  }
</style>
</head>
<body>

<div class="card">
  <h2>💳 Test uchun to‘lov</h2>

  <!-- Pulli/Bepul toggle -->
  <div class="row">
    <label><input type="checkbox" id="isPaid"> Pulli test yaratmoqchiman</label>
  </div>

  <!-- Pulli variant -->
  <div id="paidOptions">
    <div class="row">
      <label for="price">Narx (so‘m)</label>
      <input type="number" id="price" min="100" placeholder="Masalan: 5000">
    </div>

    <div class="row">
      <label for="provider">To‘lov tizimi</label>
      <select id="provider">
        <option value="click">Click</option>
        <option value="payme">Payme</option>
      </select>
    </div>

    <button id="payBtn">💰 To‘lovni amalga oshirish</button>
    <p id="status"></p>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const checkbox = document.getElementById('isPaid');
  const paidOptions = document.getElementById('paidOptions');
  const payBtn = document.getElementById('payBtn');
  const status = document.getElementById('status');

  if (!checkbox || !paidOptions || !payBtn || !status) return;

  // Pulli toggle
  checkbox.addEventListener('change', () => {
    paidOptions.style.display = checkbox.checked ? 'block' : 'none';
  });

  // To'lov tugmasi
  payBtn.addEventListener('click', async () => {
    const testId = "{{ test_id|default:'' }}";
    const amountEl = document.getElementById('price');
    const providerEl = document.getElementById('provider');

    if (!amountEl || !providerEl) return;

    const amount = parseFloat(amountEl.value);
    const provider = providerEl.value;

    if (!amount || amount < 100) {
      status.style.color = "red";
      status.textContent = "❌ Iltimos, to‘g‘ri narx kiriting.";
      return;
    }

    const token = localStorage.getItem("authToken");
    if (!token) {
      alert("🔒 Iltimos, tizimga kiring.");
      return;
    }

    status.style.color = "black";
    status.textContent = "⏳ So‘rov yuborilmoqda...";

    try {
      const response = await fetch(`/api/create-${provider}-payment/`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Token ' + token,
          'X-CSRFToken': '{{ csrf_token }}'
        },
        body: JSON.stringify({ test_id: testId, amount: amount })
      });

      const data = await response.json();

      if (response.ok && data.payment_url) {
        status.style.color = "green";
        status.textContent = "✅ To‘lov sahifasiga yo‘naltirilmoqda...";
        setTimeout(() => window.open(data.payment_url, '_blank'), 1000);
      } else {
        status.style.color = "red";
        status.textContent = "❌ " + (data.error || "Xato yuz berdi.");
      }
    } catch (err) {
      status.style.color = "red";
      status.textContent = "❌ Server bilan aloqa xatosi.";
      console.error(err);
    }
  });
});
</script>

</body>
</html>
